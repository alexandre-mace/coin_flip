<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
      <link rel="icon" href="https://em-content.zobj.net/thumbs/120/apple/271/four-leaf-clover_1f340.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Lele's coin flip"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Lele's coin flip</title>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-4-grid@3.4.0/css/grid.min.css">
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <div class='coin-flip-wrapper'>
        <div class="text-center m-auto">
            <div id="coin-flip-title">Lélé's coin flip ❤</div>
            <div id="coin">
                <div class="side-a"></div>
                <div class="side-b"></div>
            </div>
            <button id='coin-flip-button'>
                Lancer la pièce 🤞
            </button>
        </div>
    </div>
    <script>
        const coin = document.getElementById('coin');
        const button = document.getElementById('coin-flip-button');

        function coinToss() {
            const x = Math.floor(Math.random() * 2);
            coin.classList.remove('heads', 'tails');
            setTimeout(function(){
                if (x === 0) {
                    document.querySelector('#coin').classList.add('heads');
                    console.log('it is head');
                } else {
                    document.querySelector('#coin').classList.add('tails');
                    console.log('it is tails');
                }
            }, 100);
        }
        function animateButton(e) {
            e.preventDefault;
            e.target.classList.remove('animate');
            e.target.classList.add('animate');
            setTimeout(function(){
                e.target.classList.remove('animate');
            },700);
        }

        button.onclick = function(e) {
            coinToss();
            animateButton(e)
        }
    </script>

      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
