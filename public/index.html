<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
      <link rel="icon" href="https://emojipedia-us.s3.dualstack.us-west-1.amazonaws.com/thumbs/120/apple/271/four-leaf-clover_1f340.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Lele's coin flip"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Lele's coin flip</title>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-4-grid@3.4.0/css/grid.min.css">
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <div class='coin-flip-wrapper'>
        <div class="text-center m-auto">
            <div id="coin-flip-title">Lele's coin flip ❤</div>
            <img id="featureCoin"
                 src="https://upload.wikimedia.org/wikipedia/en/5/52/British_fifty_pence_coin_2015_obverse.png"/>
            <div id='coin'>
            </div>
            <button id='coin-flip-button'>
                Lancer la pièce
            </button>
        </div>
    </div>
    <script>
        var coin = document.getElementById('coin');
        var button = document.getElementById('coin-flip-button');
        var featureCoin = document.getElementById('featureCoin');

        function coinToss() {
            var x = Math.floor(Math.random() * 2);
            coin.innerHTML = '<img class="heads animate-coin" src="https://upload.wikimedia.org/wikipedia/en/5/52/British_fifty_pence_coin_2015_obverse.png" style="filter: brightness(0) contrast(0);"/>';
            if (x === 0) {
                setTimeout(() => {
                    coin.innerHTML = '<img class="heads" src="https://upload.wikimedia.org/wikipedia/en/5/52/British_fifty_pence_coin_2015_obverse.png"/>';
                }, 2000)
            } else {
                setTimeout(() => {
                    coin.innerHTML = '<img class="tails" src="https://upload.wikimedia.org/wikipedia/en/d/d8/British_fifty_pence_coin_2015_reverse.png"/>';
                }, 2000)
            }

        }
        button.onclick = function() {
            coinToss();
            featureCoin.remove();
        }
    </script>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
